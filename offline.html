<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI Invoice — Offline</title>
  <meta name="theme-color" content="#7c3aed" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2a56 0, #0b1020 42%, #060914 100%);
      color: #f8fafc;
    }
    .card {
      width: min(440px, 100%);
      padding: 28px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      background: rgba(15,23,42,.78);
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      backdrop-filter: blur(18px);
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: linear-gradient(135deg, #06b6d4, #6366f1, #8b5cf6);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.06em;
    }
    h1 { margin: 0 0 10px; font-size: 26px; letter-spacing: -.04em; }
    p { margin: 0 0 22px; color: #cbd5e1; line-height: 1.55; }
    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      background: linear-gradient(135deg, #06b6d4, #6366f1, #8b5cf6);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">AI</div>
    <h1>You are offline</h1>
    <p>AI Invoice is installed, but this page was not cached yet. Reconnect once, open the app again, then it can load faster offline.</p>
    <button onclick="location.reload()">Try Again</button>
  </main>
</body>
</html>
